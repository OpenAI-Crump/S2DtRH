<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Device Info</title>
    <link rel="icon" type="image/png" href="S2DtRH-favicon128px.png">
    <link rel="apple-touch-icon" href="S2DtRH-favicon128px.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<div class="container admin-container">

    <!-- Login -->
    <div id="admin-login" class="card">
        <h1>Administrace</h1>
        <p>Přihlaste se pro správu zařízení.</p>
        <form id="login-form" class="admin-form">
            <input type="password" id="admin-pass" placeholder="Heslo administrátora" autocomplete="off">
            <input type="text" id="github-pat" placeholder="GitHub Personal Access Token" autocomplete="off">
            <button type="submit">Přihlásit</button>
        </form>
        <p id="login-error" class="error hidden">Neplatné heslo nebo PAT.</p>
    </div>

    <!-- Navigation tabs -->
    <div id="admin-nav" class="card admin-nav hidden">
        <button id="nav-devices" class="nav-tab active">Zařízení</button>
        <button id="nav-customers" class="nav-tab">Zákazníci</button>
    </div>

    <!-- Device list -->
    <div id="admin-panel" class="card hidden">
        <div class="panel-header">
            <h1>Zařízení</h1>
            <button id="new-device-btn" class="btn-small">+ Nové</button>
        </div>
        <div id="device-list"></div>
        <p id="list-empty" class="hint hidden">Žádná zařízení. Přidejte první.</p>
        <p id="list-error" class="error hidden"></p>
        <div class="panel-actions">
            <button id="export-btn" class="btn-export hidden">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 2v8m0 0L5 7m3 3 3-3"/>
                    <path d="M2 11v2a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-2"/>
                </svg>
                Export zálohy (.zip)
            </button>
            <button id="import-btn" class="btn-export hidden">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 10V2m0 0L5 5m3-3 3 3"/>
                    <path d="M2 11v2a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-2"/>
                </svg>
                Import zálohy (.zip)
            </button>
            <input type="file" id="import-file" accept=".zip" class="hidden">
        </div>
    </div>

    <!-- Editor -->
    <div id="editor" class="card hidden">
        <h1 id="editor-title">Nové zařízení</h1>
        <form id="editor-form" class="admin-form">
            <label for="device-id-input">ID zařízení</label>
            <input type="text" id="device-id-input" placeholder="napr. cerpadlo-A-S04" autocomplete="off">
            <label for="device-content">Obsah</label>
            <textarea id="device-content" rows="10" placeholder="Text zařízení..."></textarea>
            <label for="inventory-link-input">Odkaz na inventář (volitelné)</label>
            <input type="url" id="inventory-link-input" placeholder="https://sharepoint.com/..." autocomplete="off">
            <label for="service-tag-input">Dell Service Tag (volitelné)</label>
            <input type="text" id="service-tag-input" placeholder="např. 8TFD1D4" autocomplete="off">
            <label for="warranty-end-input">Konec záruky (volitelné)</label>
            <input type="date" id="warranty-end-input">
            <label for="deployment-date-input">Datum nasazení (volitelné)</label>
            <input type="date" id="deployment-date-input">
            <label for="customer-select">Zákazník (volitelné)</label>
            <select id="customer-select">
                <option value="">— nevybráno —</option>
            </select>
        </form>
        <p class="hint">Text mezi _podtržítky_ se zobrazí <strong>tučně</strong>.</p>
        <div id="preview-box">
            <div class="preview-label">Náhled</div>
            <div id="preview-text"></div>
        </div>
        <div class="editor-actions">
            <button id="save-btn">Uložit</button>
            <button id="delete-btn" class="btn-danger hidden">Smazat</button>
            <button id="back-btn" class="btn-secondary">Zpět</button>
        </div>
        <div id="device-link-box" class="device-link-box hidden">
            <div class="preview-label">Odkaz na zařízení</div>
            <div class="device-link-row">
                <a id="device-link" href="#" target="_blank" class="device-link"></a>
                <button id="copy-link-btn" type="button" class="copy-btn" title="Kopírovat do schránky">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="5.5" y="5.5" width="8" height="8" rx="1.5"/>
                        <path d="M10.5 5.5V3a1.5 1.5 0 0 0-1.5-1.5H3A1.5 1.5 0 0 0 1.5 3v6A1.5 1.5 0 0 0 3 10.5h2.5"/>
                    </svg>
                </button>
            </div>
        </div>
        <p id="editor-status" class="hidden"></p>
    </div>

    <!-- Customer list -->
    <div id="customer-panel" class="card hidden">
        <div class="panel-header">
            <h1>Zákazníci</h1>
            <button id="new-customer-btn" class="btn-small">+ Nový</button>
        </div>
        <table id="customer-table" class="customer-table hidden">
            <thead>
                <tr><th>IČO</th><th>DIČ</th><th>Název</th></tr>
            </thead>
            <tbody id="customer-tbody"></tbody>
        </table>
        <p id="cust-list-empty" class="hint hidden">Žádní zákazníci.</p>
        <p id="cust-list-error" class="error hidden"></p>
    </div>

    <!-- Customer editor -->
    <div id="customer-editor" class="card hidden">
        <h1 id="cust-editor-title">Nový zákazník</h1>
        <form id="cust-editor-form" class="admin-form">
            <label for="cust-cin-input">IČO</label>
            <div class="input-with-btn">
                <input type="text" id="cust-cin-input" placeholder="12345678" autocomplete="off" maxlength="8" inputmode="numeric">
                <button type="button" id="ares-cin-btn" class="btn-small" title="Hledat v ARES">ARES</button>
            </div>
            <label for="cust-vat-input">DIČ</label>
            <input type="text" id="cust-vat-input" placeholder="CZ12345678" autocomplete="off" maxlength="12">
            <label for="cust-name-input">Název</label>
            <div class="input-with-btn">
                <input type="text" id="cust-name-input" placeholder="Název společnosti" autocomplete="off">
                <button type="button" id="ares-name-btn" class="btn-small" title="Hledat v ARES">ARES</button>
            </div>
        </form>
        <div id="ares-results" class="ares-results hidden"></div>
        <div class="editor-actions">
            <button id="cust-save-btn">Uložit</button>
            <button id="cust-delete-btn" class="btn-danger hidden">Smazat</button>
            <button id="cust-back-btn" class="btn-secondary">Zpět</button>
        </div>
        <p id="cust-editor-status" class="hidden"></p>
    </div>

</div>

<script src="crypto.js"></script>
<script>
(function () {
    "use strict";

    var githubPat = "";
    var editingSha = null;
    var editingName = "";
    var customers = [];
    var customersSha = null;

    var elLogin = document.getElementById("admin-login");
    var elLoginForm = document.getElementById("login-form");
    var elAdminPass = document.getElementById("admin-pass");
    var elGithubPat = document.getElementById("github-pat");
    var elLoginError = document.getElementById("login-error");

    var elAdminNav = document.getElementById("admin-nav");
    var elNavDevices = document.getElementById("nav-devices");
    var elNavCustomers = document.getElementById("nav-customers");

    var elPanel = document.getElementById("admin-panel");
    var elDeviceList = document.getElementById("device-list");
    var elListEmpty = document.getElementById("list-empty");
    var elListError = document.getElementById("list-error");
    var elNewBtn = document.getElementById("new-device-btn");
    var elExportBtn = document.getElementById("export-btn");
    var elImportBtn = document.getElementById("import-btn");
    var elImportFile = document.getElementById("import-file");

    var elEditor = document.getElementById("editor");
    var elEditorTitle = document.getElementById("editor-title");
    var elDeviceIdInput = document.getElementById("device-id-input");
    var elDeviceContent = document.getElementById("device-content");
    var elInventoryLink = document.getElementById("inventory-link-input");
    var elServiceTag = document.getElementById("service-tag-input");
    var elWarrantyEnd = document.getElementById("warranty-end-input");
    var elDeploymentDate = document.getElementById("deployment-date-input");
    var elCustomerSelect = document.getElementById("customer-select");
    var elPreviewText = document.getElementById("preview-text");
    var elSaveBtn = document.getElementById("save-btn");
    var elDeleteBtn = document.getElementById("delete-btn");
    var elBackBtn = document.getElementById("back-btn");
    var elEditorStatus = document.getElementById("editor-status");
    var elDeviceLinkBox = document.getElementById("device-link-box");
    var elDeviceLink = document.getElementById("device-link");
    var elCopyLinkBtn = document.getElementById("copy-link-btn");

    var elCustPanel = document.getElementById("customer-panel");
    var elCustTable = document.getElementById("customer-table");
    var elCustTbody = document.getElementById("customer-tbody");
    var elCustListEmpty = document.getElementById("cust-list-empty");
    var elCustListError = document.getElementById("cust-list-error");
    var elNewCustBtn = document.getElementById("new-customer-btn");
    var elCustEditor = document.getElementById("customer-editor");
    var elCustEditorTitle = document.getElementById("cust-editor-title");
    var elCustCin = document.getElementById("cust-cin-input");
    var elCustVat = document.getElementById("cust-vat-input");
    var elCustName = document.getElementById("cust-name-input");
    var elAresCinBtn = document.getElementById("ares-cin-btn");
    var elAresNameBtn = document.getElementById("ares-name-btn");
    var elAresResults = document.getElementById("ares-results");
    var elCustSaveBtn = document.getElementById("cust-save-btn");
    var elCustDeleteBtn = document.getElementById("cust-delete-btn");
    var elCustBackBtn = document.getElementById("cust-back-btn");
    var elCustEditorStatus = document.getElementById("cust-editor-status");
    var editingCustomerIndex = -1;

    function show(el) { el.classList.remove("hidden"); }
    function hide(el) { el.classList.add("hidden"); }

    function showStatus(msg, isError) {
        elEditorStatus.textContent = msg;
        elEditorStatus.className = isError ? "error" : "success";
        show(elEditorStatus);
        if (!isError) setTimeout(function () { hide(elEditorStatus); }, 3000);
    }

    function showCustStatus(msg, isError) {
        elCustEditorStatus.textContent = msg;
        elCustEditorStatus.className = isError ? "error" : "success";
        show(elCustEditorStatus);
        if (!isError) setTimeout(function () { hide(elCustEditorStatus); }, 3000);
    }

    function apiUrl(path) {
        return "https://api.github.com/repos/" + S2DtRH.GITHUB_OWNER + "/" + S2DtRH.GITHUB_REPO + "/contents/" + path;
    }

    function apiFetch(path, options) {
        options = options || {};
        options.headers = options.headers || {};
        options.headers["Authorization"] = "token " + githubPat;
        options.headers["Accept"] = "application/vnd.github.v3+json";
        if (options.body) options.headers["Content-Type"] = "application/json";
        return fetch(apiUrl(path), options);
    }

    // ---- Navigation ----
    function showDevicesView() {
        elNavDevices.classList.add("active");
        elNavCustomers.classList.remove("active");
        show(elPanel);
        hide(elCustPanel);
        hide(elEditor);
        hide(elCustEditor);
    }

    function showCustomersView() {
        elNavCustomers.classList.add("active");
        elNavDevices.classList.remove("active");
        hide(elPanel);
        show(elCustPanel);
        hide(elEditor);
        hide(elCustEditor);
        renderCustomerTable();
    }

    elNavDevices.addEventListener("click", showDevicesView);
    elNavCustomers.addEventListener("click", showCustomersView);

    // ---- Customer data ----
    function loadCustomers() {
        return apiFetch("customers.txt").then(function (r) {
            if (!r.ok) { customersSha = null; return; }
            return r.json();
        }).then(function (data) {
            if (!data || !data.content) return;
            customersSha = data.sha;
            var binary = atob(data.content.replace(/\s/g, ""));
            var bytes = new Uint8Array(binary.length);
            for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            var text = new TextDecoder("utf-8").decode(bytes);
            var lines = text.split("\n").filter(function (l) { return l.trim(); });
            customers = [];
            lines.forEach(function (line) {
                var parts = line.split(",");
                if (parts.length >= 3) {
                    customers.push({
                        cin: parts[0].trim(),
                        vat: parts[1].trim(),
                        name: parts.slice(2).join(",").trim()
                    });
                }
            });
            refreshCustomerSelect();
        }).catch(function () {});
    }

    function refreshCustomerSelect() {
        elCustomerSelect.innerHTML = '<option value="">— nevybráno —</option>';
        customers.forEach(function (c) {
            var opt = document.createElement("option");
            opt.value = c.name;
            opt.textContent = c.name;
            elCustomerSelect.appendChild(opt);
        });
    }

    function customersToCSV() {
        return customers.map(function (c) {
            return c.cin + "," + c.vat + "," + c.name;
        }).join("\n") + "\n";
    }

    function saveCustomersFile() {
        var csv = customersToCSV();
        var body = {
            message: "Update customers.txt",
            content: btoa(unescape(encodeURIComponent(csv)))
        };
        if (customersSha) body.sha = customersSha;
        return apiFetch("customers.txt", {
            method: "PUT",
            body: JSON.stringify(body)
        }).then(function (r) {
            return r.json();
        }).then(function (data) {
            if (data.content) {
                customersSha = data.content.sha;
                refreshCustomerSelect();
            }
            return data;
        });
    }

    function renderCustomerTable() {
        elCustTbody.innerHTML = "";
        hide(elCustListError);
        if (customers.length === 0) {
            hide(elCustTable);
            show(elCustListEmpty);
            return;
        }
        hide(elCustListEmpty);
        show(elCustTable);
        customers.forEach(function (c, idx) {
            var tr = document.createElement("tr");
            var tdCin = document.createElement("td");
            tdCin.textContent = c.cin;
            var tdVat = document.createElement("td");
            tdVat.textContent = c.vat;
            var tdName = document.createElement("td");
            tdName.textContent = c.name;
            tr.appendChild(tdCin);
            tr.appendChild(tdVat);
            tr.appendChild(tdName);
            tr.addEventListener("click", function () { openCustomerEditor(idx); });
            elCustTbody.appendChild(tr);
        });
    }

    // ---- Customer editor ----
    function openCustomerEditor(idx) {
        hide(elCustPanel);
        show(elCustEditor);
        hide(elCustEditorStatus);
        hide(elAresResults);
        editingCustomerIndex = idx;

        if (idx >= 0) {
            var c = customers[idx];
            elCustEditorTitle.textContent = "Upravit: " + c.name;
            elCustCin.value = c.cin;
            elCustVat.value = c.vat;
            elCustName.value = c.name;
            show(elCustDeleteBtn);
        } else {
            elCustEditorTitle.textContent = "Nový zákazník";
            elCustCin.value = "";
            elCustVat.value = "";
            elCustName.value = "";
            hide(elCustDeleteBtn);
        }
    }

    elNewCustBtn.addEventListener("click", function () { openCustomerEditor(-1); });

    elCustBackBtn.addEventListener("click", function () {
        hide(elCustEditor);
        show(elCustPanel);
        renderCustomerTable();
    });

    // ---- Validation ----
    function validateCIN(v) {
        return /^\d{8}$/.test(v);
    }

    function validateVAT(v) {
        return /^CZ\d{8,10}$/.test(v);
    }

    // ---- Customer save ----
    elCustSaveBtn.addEventListener("click", function () {
        var cin = elCustCin.value.trim();
        var vat = elCustVat.value.trim().toUpperCase();
        var name = elCustName.value.trim();

        if (!cin || !validateCIN(cin)) {
            showCustStatus("IČO musí být přesně 8 číslic.", true); return;
        }
        if (!vat || !validateVAT(vat)) {
            showCustStatus("DIČ musí být ve formátu CZ + 8–10 číslic (např. CZ12345678).", true); return;
        }
        if (!name) {
            showCustStatus("Zadejte název zákazníka.", true); return;
        }

        var entry = { cin: cin, vat: vat, name: name };
        if (editingCustomerIndex >= 0) {
            customers[editingCustomerIndex] = entry;
        } else {
            customers.push(entry);
        }

        elCustSaveBtn.disabled = true;
        elCustSaveBtn.textContent = "Ukládání...";

        saveCustomersFile().then(function (data) {
            if (data.content) {
                editingCustomerIndex = customers.indexOf(entry);
                show(elCustDeleteBtn);
                showCustStatus("Uloženo.", false);
            } else {
                showCustStatus("Chyba: " + (data.message || "Neznámá chyba"), true);
            }
        }).catch(function (err) {
            showCustStatus("Chyba: " + err.message, true);
        }).then(function () {
            elCustSaveBtn.disabled = false;
            elCustSaveBtn.textContent = "Uložit";
        });
    });

    // ---- Customer delete ----
    elCustDeleteBtn.addEventListener("click", function () {
        if (editingCustomerIndex < 0) return;
        var name = customers[editingCustomerIndex].name;
        if (!confirm('Opravdu smazat zákazníka "' + name + '"?')) return;

        customers.splice(editingCustomerIndex, 1);
        elCustDeleteBtn.disabled = true;
        elCustDeleteBtn.textContent = "Mazání...";

        saveCustomersFile().then(function () {
            hide(elCustEditor);
            show(elCustPanel);
            renderCustomerTable();
        }).catch(function (err) {
            showCustStatus("Chyba: " + err.message, true);
        }).then(function () {
            elCustDeleteBtn.disabled = false;
            elCustDeleteBtn.textContent = "Smazat";
        });
    });

    // ---- ARES ----
    var ARES_BASE = "https://ares.gov.cz/ekonomicke-subjekty-v-registru-osob/rest/ekonomicke-subjekty";

    function aresLookupByCin(cin) {
        hide(elAresResults);
        if (!cin || !/^\d{1,8}$/.test(cin)) {
            showCustStatus("Zadejte platné IČO (až 8 číslic).", true); return;
        }
        elAresCinBtn.disabled = true;
        elAresCinBtn.textContent = "...";

        fetch(ARES_BASE + "/" + cin).then(function (r) {
            if (!r.ok) throw new Error("Subjekt nenalezen (HTTP " + r.status + ")");
            return r.json();
        }).then(function (data) {
            elCustCin.value = data.ico || cin;
            elCustVat.value = data.dic || "";
            elCustName.value = data.obchodniJmeno || "";
            showCustStatus("Načteno z ARES.", false);
        }).catch(function (err) {
            showCustStatus("ARES: " + err.message, true);
        }).then(function () {
            elAresCinBtn.disabled = false;
            elAresCinBtn.textContent = "ARES";
        });
    }

    function aresSearchByName(query) {
        hide(elAresResults);
        if (!query || query.length < 2) {
            showCustStatus("Zadejte alespoň 2 znaky pro vyhledávání.", true); return;
        }
        elAresNameBtn.disabled = true;
        elAresNameBtn.textContent = "...";

        fetch(ARES_BASE + "/vyhledat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ obchodniJmeno: query, start: 0, pocet: 10 })
        }).then(function (r) {
            if (!r.ok) throw new Error("Vyhledávání selhalo (HTTP " + r.status + ")");
            return r.json();
        }).then(function (data) {
            var items = (data.ekonomickeSubjekty || []);
            if (items.length === 0) {
                showCustStatus("ARES: žádné výsledky.", true);
                return;
            }
            elAresResults.innerHTML = "";
            items.forEach(function (item) {
                var div = document.createElement("div");
                div.className = "ares-item";
                div.innerHTML = "<strong></strong> <small></small>";
                div.querySelector("strong").textContent = item.obchodniJmeno || "—";
                div.querySelector("small").textContent = "IČO: " + (item.ico || "—") + (item.dic ? " | DIČ: " + item.dic : "");
                div.addEventListener("click", function () {
                    elCustCin.value = item.ico || "";
                    elCustVat.value = item.dic || "";
                    elCustName.value = item.obchodniJmeno || "";
                    hide(elAresResults);
                });
                elAresResults.appendChild(div);
            });
            show(elAresResults);
        }).catch(function (err) {
            showCustStatus("ARES: " + err.message, true);
        }).then(function () {
            elAresNameBtn.disabled = false;
            elAresNameBtn.textContent = "ARES";
        });
    }

    elAresCinBtn.addEventListener("click", function () {
        aresLookupByCin(elCustCin.value.trim());
    });

    elAresNameBtn.addEventListener("click", function () {
        aresSearchByName(elCustName.value.trim());
    });

    function loadDeviceList() {
        hide(elListEmpty);
        hide(elListError);
        hide(elExportBtn);
        hide(elImportBtn);
        elDeviceList.innerHTML = '<p class="hint">Načítání...</p>';

        apiFetch("devices").then(function (r) {
            if (r.status === 404) return [];
            return r.json();
        }).then(function (files) {
            if (!Array.isArray(files)) files = [];
            var devices = files.filter(function (f) {
                return f.name.endsWith(".txt");
            });

            elDeviceList.innerHTML = "";

            if (devices.length === 0) {
                show(elListEmpty);
                show(elImportBtn);
                return;
            }

            devices.forEach(function (f) {
                var name = f.name.replace(/\.txt$/, "");
                var item = document.createElement("div");
                item.className = "device-list-item";
                item.textContent = name;
                item.addEventListener("click", function () {
                    openEditor({ name: name, sha: f.sha });
                });
                elDeviceList.appendChild(item);
            });

            show(elExportBtn);
            show(elImportBtn);
        }).catch(function (err) {
            elDeviceList.innerHTML = "";
            elListError.textContent = "Chyba: " + err.message;
            show(elListError);
        });
    }

    function decodeFileContent(data) {
        var binary = atob(data.content.replace(/\s/g, ""));
        var bytes = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        var raw = new TextDecoder("utf-8").decode(bytes);
        return Promise.resolve().then(function () {
            return S2DtRH.decrypt(raw.trim());
        }).catch(function () {
            return raw;
        });
    }

    function openEditor(dev) {
        hide(elPanel);
        show(elEditor);
        hide(elEditorStatus);
        elInventoryLink.value = "";
        elServiceTag.value = "";
        elWarrantyEnd.value = "";
        elDeploymentDate.value = "";
        elCustomerSelect.value = "";

        if (dev) {
            elEditorTitle.textContent = "Upravit: " + dev.name;
            elDeviceIdInput.value = dev.name;
            elDeviceIdInput.readOnly = true;
            editingSha = dev.sha;
            editingName = dev.name;
            show(elDeleteBtn);

            elDeviceContent.value = "Načítání...";
            elDeviceContent.disabled = true;
            updateDeviceLink();

            apiFetch("devices/" + dev.name + ".txt").then(function (r) {
                if (!r.ok) throw new Error("HTTP " + r.status);
                return r.json();
            }).then(function (data) {
                editingSha = data.sha;
                if (!data.content) throw new Error("Prázdný soubor");
                return decodeFileContent(data);
            }).then(function (plaintext) {
                var device = S2DtRH.parseDeviceData(plaintext);
                elDeviceContent.value = device.content;
                elInventoryLink.value = device.inventoryLink;
                elServiceTag.value = device.serviceTag;
                elWarrantyEnd.value = device.warrantyEnd;
                elDeploymentDate.value = device.deploymentDate;
                elCustomerSelect.value = device.customer;
                elDeviceContent.disabled = false;
                updatePreview();
            }).catch(function (err) {
                elDeviceContent.value = "";
                elDeviceContent.disabled = false;
                showStatus("Nepodařilo se načíst: " + err.message, true);
            });
        } else {
            elEditorTitle.textContent = "Nové zařízení";
            elDeviceIdInput.value = "";
            elDeviceIdInput.readOnly = false;
            elDeviceContent.value = "";
            elDeviceContent.disabled = false;
            editingSha = null;
            editingName = "";
            hide(elDeleteBtn);
            updatePreview();
            updateDeviceLink();
        }
    }

    function updatePreview() {
        elPreviewText.innerHTML = S2DtRH.formatText(elDeviceContent.value);
    }

    function updateDeviceLink() {
        var id = elDeviceIdInput.value.trim();
        if (id && /^[a-zA-Z0-9_\-]+$/.test(id)) {
            var url = window.location.origin + "/?id=" + encodeURIComponent(id);
            elDeviceLink.href = url;
            elDeviceLink.textContent = url;
            show(elDeviceLinkBox);
        } else {
            hide(elDeviceLinkBox);
        }
    }

    function closeEditor() {
        hide(elEditor);
        show(elPanel);
        loadDeviceList();
    }

    // Save
    elSaveBtn.addEventListener("click", function () {
        var id = elDeviceIdInput.value.trim();
        var content = elDeviceContent.value;
        var inventoryLink = elInventoryLink.value.trim();
        var serviceTag = elServiceTag.value.trim();
        var warrantyEnd = elWarrantyEnd.value;
        var deploymentDate = elDeploymentDate.value;
        var customer = elCustomerSelect.value;

        if (!id) { showStatus("Zadejte ID zařízení.", true); return; }
        if (!/^[a-zA-Z0-9_\-]+$/.test(id)) {
            showStatus("ID může obsahovat pouze písmena, čísla, pomlčky a podtržítka.", true);
            return;
        }
        if (!content.trim()) { showStatus("Obsah nesmí být prázdný.", true); return; }

        elSaveBtn.disabled = true;
        elSaveBtn.textContent = "Ukládání...";

        var deviceData = S2DtRH.serializeDeviceData({
            content: content,
            inventoryLink: inventoryLink,
            serviceTag: serviceTag,
            warrantyEnd: warrantyEnd,
            deploymentDate: deploymentDate,
            customer: customer
        });

        S2DtRH.encrypt(deviceData).then(function (encrypted) {
            var body = {
                message: (editingSha ? "Update " : "Create ") + id + ".txt",
                content: btoa(encrypted)
            };
            if (editingSha) body.sha = editingSha;

            return apiFetch("devices/" + id + ".txt", {
                method: "PUT",
                body: JSON.stringify(body)
            });
        }).then(function (r) {
            return r.json();
        }).then(function (data) {
            if (data.content) {
                editingSha = data.content.sha;
                editingName = id;
                elDeviceIdInput.readOnly = true;
                show(elDeleteBtn);
                showStatus("Uloženo.", false);
            } else {
                showStatus("Chyba: " + (data.message || "Neznámá chyba"), true);
            }
        }).catch(function (err) {
            showStatus("Chyba: " + err.message, true);
        }).then(function () {
            elSaveBtn.disabled = false;
            elSaveBtn.textContent = "Uložit";
        });
    });

    // Delete
    elDeleteBtn.addEventListener("click", function () {
        if (!editingName) return;
        if (!confirm('Opravdu smazat zařízení "' + editingName + '"?')) return;

        var deviceName = editingName;
        elDeleteBtn.disabled = true;
        elDeleteBtn.textContent = "Mazání...";

        apiFetch("devices/" + deviceName + ".txt").then(function (r) {
            if (!r.ok) throw new Error("Soubor nenalezen (HTTP " + r.status + ")");
            return r.json();
        }).then(function (data) {
            return apiFetch("devices/" + deviceName + ".txt", {
                method: "DELETE",
                body: JSON.stringify({
                    message: "Delete " + deviceName + ".txt",
                    sha: data.sha
                })
            });
        }).then(function (r) {
            if (!r.ok) {
                return r.json().then(function (d) {
                    throw new Error(d.message || "Nepodařilo se smazat");
                });
            }
            editingSha = null;
            editingName = "";
            hide(elEditor);
            show(elPanel);
            // Remove item from list immediately (optimistic)
            var items = elDeviceList.querySelectorAll(".device-list-item");
            for (var i = 0; i < items.length; i++) {
                if (items[i].textContent === deviceName) {
                    items[i].remove();
                    break;
                }
            }
            if (elDeviceList.children.length === 0) {
                show(elListEmpty);
                hide(elExportBtn);
            }
        }).catch(function (err) {
            showStatus("Chyba při mazání: " + err.message, true);
        }).then(function () {
            elDeleteBtn.disabled = false;
            elDeleteBtn.textContent = "Smazat";
        });
    });

    // Back
    elBackBtn.addEventListener("click", closeEditor);

    // New device
    elNewBtn.addEventListener("click", function () { openEditor(null); });

    // Live preview + link update
    elDeviceContent.addEventListener("input", updatePreview);
    elDeviceIdInput.addEventListener("input", updateDeviceLink);

    // Copy link to clipboard
    elCopyLinkBtn.addEventListener("click", function () {
        var url = elDeviceLink.href;
        navigator.clipboard.writeText(url).then(function () {
            elCopyLinkBtn.title = "Zkopírováno!";
            elCopyLinkBtn.classList.add("copied");
            setTimeout(function () {
                elCopyLinkBtn.title = "Kopírovat do schránky";
                elCopyLinkBtn.classList.remove("copied");
            }, 1500);
        });
    });

    // Export all devices as ZIP
    elExportBtn.addEventListener("click", function () {
        elExportBtn.disabled = true;
        elExportBtn.textContent = "Exportování...";

        apiFetch("devices").then(function (r) {
            if (!r.ok) throw new Error("HTTP " + r.status);
            return r.json();
        }).then(function (files) {
            var txtFiles = files.filter(function (f) { return f.name.endsWith(".txt"); });
            return Promise.all(txtFiles.map(function (f) {
                return apiFetch("devices/" + f.name).then(function (r) {
                    if (!r.ok) throw new Error("HTTP " + r.status + " for " + f.name);
                    return r.json();
                }).then(function (data) {
                    if (!data.content) return { name: f.name, text: "" };
                    return decodeFileContent(data).then(function (text) {
                        return { name: f.name, text: text };
                    });
                });
            }));
        }).then(function (devices) {
            var zip = new JSZip();
            devices.forEach(function (d) {
                var data = S2DtRH.parseDeviceData(d.text);
                var formatted = JSON.stringify(data, null, "\t");
                zip.file(d.name, formatted);
            });
            return zip.generateAsync({ type: "blob" });
        }).then(function (blob) {
            var now = new Date();
            var stamp = now.getFullYear() + "-" +
                String(now.getMonth() + 1).padStart(2, "0") + "-" +
                String(now.getDate()).padStart(2, "0") + "-" +
                String(now.getHours()).padStart(2, "0") + "-" +
                String(now.getMinutes()).padStart(2, "0");
            var a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = stamp + "-Devices-backup.zip";
            a.click();
            URL.revokeObjectURL(a.href);
        }).catch(function (err) {
            alert("Export selhal: " + err.message);
        }).then(function () {
            elExportBtn.disabled = false;
            elExportBtn.textContent = "Export zálohy (.zip)";
        });
    });

    // Import from ZIP
    elImportBtn.addEventListener("click", function () {
        elImportFile.click();
    });

    elImportFile.addEventListener("change", function () {
        var file = elImportFile.files[0];
        if (!file) return;
        elImportFile.value = "";

        if (!confirm("Importovat zálohu? Existující soubory se přepíší.")) return;

        elImportBtn.disabled = true;
        elImportBtn.textContent = "Importování...";

        var existingFiles = {};

        apiFetch("devices").then(function (r) {
            if (r.status === 404) return [];
            return r.json();
        }).then(function (files) {
            if (Array.isArray(files)) {
                files.forEach(function (f) {
                    if (f.name.endsWith(".txt")) existingFiles[f.name] = f.sha;
                });
            }
            return JSZip.loadAsync(file);
        }).then(function (zip) {
            var tasks = [];
            zip.forEach(function (path, entry) {
                if (entry.dir) return;
                var name = path.split("/").pop();
                if (!name.endsWith(".txt")) return;
                tasks.push(
                    entry.async("string").then(function (text) {
                        return { name: name, text: text };
                    })
                );
            });
            return Promise.all(tasks);
        }).then(function (entries) {
            var chain = Promise.resolve();
            var imported = 0;
            entries.forEach(function (entry) {
                chain = chain.then(function () {
                    return S2DtRH.encrypt(entry.text).then(function (encrypted) {
                        var body = {
                            message: "Import " + entry.name,
                            content: btoa(encrypted)
                        };
                        if (existingFiles[entry.name]) body.sha = existingFiles[entry.name];
                        return apiFetch("devices/" + entry.name, {
                            method: "PUT",
                            body: JSON.stringify(body)
                        });
                    }).then(function (r) {
                        if (!r.ok) {
                            return r.json().then(function (d) {
                                throw new Error(entry.name + ": " + (d.message || "Chyba"));
                            });
                        }
                        imported++;
                        elImportBtn.textContent = "Importováno " + imported + "/" + entries.length + "...";
                    });
                });
            });
            return chain;
        }).then(function () {
            loadDeviceList();
            alert("Import dokončen.");
        }).catch(function (err) {
            alert("Import selhal: " + err.message);
            loadDeviceList();
        }).then(function () {
            elImportBtn.disabled = false;
            elImportBtn.textContent = "Import zálohy (.zip)";
        });
    });

    // Login
    elLoginForm.addEventListener("submit", function (e) {
        e.preventDefault();
        hide(elLoginError);
        var pass = elAdminPass.value;
        githubPat = elGithubPat.value.trim();

        if (!githubPat) {
            elLoginError.textContent = "Zadejte GitHub PAT.";
            show(elLoginError);
            return;
        }

        S2DtRH.sha256(pass).then(function (hash) {
            if (hash === S2DtRH.ADMIN_HASH) {
                hide(elLogin);
                show(elAdminNav);
                show(elPanel);
                loadCustomers();
                loadDeviceList();
            } else {
                elLoginError.textContent = "Neplatné heslo.";
                show(elLoginError);
                elAdminPass.value = "";
                elAdminPass.focus();
            }
        });
    });
})();
</script>

</body>
</html>
