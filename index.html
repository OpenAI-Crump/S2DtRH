<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Info</title>
    <link rel="icon" type="image/png" href="S2DtRH-favicon128px.png">
    <link rel="apple-touch-icon" href="S2DtRH-favicon128px.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>

<div class="container">

    <div id="no-device" class="card hidden">
        <img src="DeviceUnifiPro.png" alt="Device Info" class="hero-img">
        <div id="lang-sw-landing"></div>
        <p id="txt-scan-prompt"></p>
        <label id="scan-btn" class="scan-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
                <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
                <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
                <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
                <rect x="7" y="7" width="10" height="10" rx="1"/>
            </svg>
            <span id="txt-scan-btn"></span>
            <input type="file" id="scan-input" accept="image/*" class="hidden">
        </label>
        <p id="txt-scan-hint" class="hint" style="text-align:center; margin-top:0.5rem;"></p>
        <p id="scan-error" class="error hidden"></p>
    </div>

    <div id="auth-gate" class="card hidden">
        <div id="lang-sw-auth"></div>
        <p id="txt-auth-prompt"></p>
        <form id="code-form">
            <input
                type="text"
                id="code-input"
                maxlength="5"
                placeholder="*****"
                autocomplete="off"
                inputmode="text"
            >
            <button type="submit" id="code-submit"></button>
        </form>
        <p id="code-error" class="error hidden"></p>
    </div>

    <div id="device-content" class="card hidden">
        <h1 id="device-title"></h1>
        <div id="device-text"></div>
        <div id="device-meta" class="device-meta hidden"></div>
        <div id="device-actions" class="device-actions hidden">
            <a id="inventory-btn" href="#" target="_blank" class="action-btn hidden"></a>
            <a id="dell-btn" href="#" target="_blank" class="action-btn hidden"></a>
        </div>
    </div>

    <div id="device-not-found" class="card hidden">
        <p id="txt-not-found"></p>
    </div>

</div>

<script src="crypto.js"></script>
<script src="i18n.js"></script>
<script>
(function () {
    "use strict";

    var T = S2DtRH_i18n.t;

    function applyTexts() {
        T = S2DtRH_i18n.t;
        document.title = T("pageTitle");
        document.getElementById("txt-scan-prompt").textContent = T("scanPrompt");
        document.getElementById("txt-scan-btn").textContent = T("scanBtn");
        document.getElementById("txt-scan-hint").textContent = T("scanHint");
        document.getElementById("code-submit").textContent = T("authSubmit");
        document.getElementById("txt-auth-prompt").textContent = T("authPrompt");
        document.getElementById("code-error").textContent = T("authError");
        document.getElementById("txt-not-found").textContent = T("deviceNotFound");
        document.getElementById("inventory-btn").textContent = T("showInventory");
        document.getElementById("dell-btn").textContent = T("showDell");
    }

    applyTexts();

    // Insert lang switcher
    var sw1 = S2DtRH_i18n.createLangSwitcher();
    document.getElementById("lang-sw-landing").appendChild(sw1);
    var sw2 = S2DtRH_i18n.createLangSwitcher();
    document.getElementById("lang-sw-auth").appendChild(sw2);

    document.addEventListener("langchange", function () {
        applyTexts();
        // Sync both switchers
        var lang = S2DtRH_i18n.currentLang();
        document.querySelectorAll(".lang-btn").forEach(function (b) {
            b.classList.toggle("active", b.getAttribute("data-lang") === lang);
        });
    });

    var params = new URLSearchParams(window.location.search);
    var deviceId = params.get("id");

    var elNoDevice = document.getElementById("no-device");
    var elAuthGate = document.getElementById("auth-gate");
    var elContent = document.getElementById("device-content");
    var elNotFound = document.getElementById("device-not-found");
    var elCodeForm = document.getElementById("code-form");
    var elCodeInput = document.getElementById("code-input");
    var elCodeError = document.getElementById("code-error");
    var elDeviceTitle = document.getElementById("device-title");
    var elDeviceText = document.getElementById("device-text");
    var elDeviceActions = document.getElementById("device-actions");
    var elInventoryBtn = document.getElementById("inventory-btn");
    var elDellBtn = document.getElementById("dell-btn");
    var elDeviceMeta = document.getElementById("device-meta");

    function show(el) { el.classList.remove("hidden"); }
    function hide(el) { el.classList.add("hidden"); }

    function getExpectedCode() {
        var now = new Date();
        var parts = new Intl.DateTimeFormat("cs-CZ", {
            timeZone: "Europe/Prague",
            year: "2-digit",
            month: "2-digit"
        }).formatToParts(now);

        var year = "";
        var month = "";
        for (var i = 0; i < parts.length; i++) {
            if (parts[i].type === "year") year = parts[i].value;
            if (parts[i].type === "month") month = parts[i].value;
        }
        return year + month + "#";
    }

    function loadDevice(id) {
        var url = "devices/" + encodeURIComponent(id) + ".txt";
        var xhr = new XMLHttpRequest();
        xhr.open("GET", url, true);
        xhr.onload = function () {
            if (xhr.status === 200) {
                var raw = xhr.responseText.trim();
                Promise.resolve().then(function () {
                    return S2DtRH.decrypt(raw);
                }).catch(function () {
                    return raw;
                }).then(function (text) {
                    var device = S2DtRH.parseDeviceData(text);
                    elDeviceTitle.textContent = id;
                    elDeviceText.innerHTML = S2DtRH.formatText(device.content);
                    var hasActions = false;
                    if (device.inventoryLink) {
                        elInventoryBtn.href = device.inventoryLink;
                        show(elInventoryBtn);
                        hasActions = true;
                    }
                    if (device.serviceTag) {
                        elDellBtn.href = "https://www.dell.com/support/product-details/en-us/servicetag/" + encodeURIComponent(device.serviceTag);
                        show(elDellBtn);
                        hasActions = true;
                    }
                    var metaLines = [];
                    if (device.customer) metaLines.push(T("metaCustomer") + ": " + device.customer);
                    if (device.deploymentDate) metaLines.push(T("metaDeployed") + ": " + device.deploymentDate);
                    if (device.warrantyEnd) metaLines.push(T("metaWarranty") + ": " + device.warrantyEnd);
                    if (metaLines.length) {
                        elDeviceMeta.innerHTML = metaLines.map(function (l) {
                            var d = document.createElement("div");
                            d.textContent = l;
                            return d.outerHTML;
                        }).join("");
                        show(elDeviceMeta);
                    }
                    if (hasActions) show(elDeviceActions);
                    show(elContent);
                });
            } else {
                show(elNotFound);
            }
        };
        xhr.onerror = function () {
            show(elNotFound);
        };
        xhr.send();
    }

    if (!deviceId) {
        show(elNoDevice);

        var elScanInput = document.getElementById("scan-input");
        var elScanError = document.getElementById("scan-error");

        elScanInput.addEventListener("change", function () {
            var file = elScanInput.files[0];
            if (!file) return;
            hide(elScanError);

            var img = new Image();
            img.onload = function () {
                var canvas = document.createElement("canvas");
                canvas.width = img.width;
                canvas.height = img.height;
                var ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0);
                var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                var code = jsQR(imageData.data, canvas.width, canvas.height);

                if (code && code.data) {
                    try {
                        var url = new URL(code.data);
                        window.location.href = url.href;
                        return;
                    } catch (e) {}
                    window.location.href = code.data;
                } else {
                    elScanError.textContent = T("scanNotFound");
                    show(elScanError);
                }
                elScanInput.value = "";
            };
            img.onerror = function () {
                elScanError.textContent = T("scanPhotoError");
                show(elScanError);
                elScanInput.value = "";
            };
            img.src = URL.createObjectURL(file);
        });

        return;
    }

    if (!/^[a-zA-Z0-9_\-]+$/.test(deviceId)) {
        show(elNoDevice);
        return;
    }

    show(elAuthGate);
    elCodeInput.focus();

    elCodeForm.addEventListener("submit", function (e) {
        e.preventDefault();
        var entered = elCodeInput.value.trim();
        var expected = getExpectedCode();

        if (entered === expected) {
            hide(elAuthGate);
            hide(elCodeError);
            loadDevice(deviceId);
        } else {
            show(elCodeError);
            elCodeInput.value = "";
            elCodeInput.focus();
        }
    });
})();
</script>

</body>
</html>
